services:
  - type: web
    runtime: node
    name: sima-backend-monitoreo
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_SSL
        value: "false"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        value: "true"
      - key: CORS_ORIGIN
        sync: false
      - key: UPLOAD_DIR
        value: uploads
